<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>카드 메이커</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Noto+Serif+KR:wght@400;600;700;900&family=Black+Han+Sans&family=Gowun+Dodum&family=Gowun+Batang:wght@400;700&family=Gaegu:wght@400;700&family=Jua&family=Do+Hyeon&family=Nanum+Myeongjo:wght@400;700&family=Nanum+Gothic:wght@400;700&family=Nanum+Pen+Script&family=Nanum+Brush+Script&family=Poor+Story&family=Hi+Melody&family=Gamja+Flower&family=Hahmlet:wght@400;700&family=Song+Myung&family=Sunflower:wght@300;500;700&family=Single+Day&family=Kirang+Haerang&family=Gugi&family=Stylish&family=Cute+Font&family=East+Sea+Dokdo&family=Dokdo&family=IBM+Plex+Sans+KR:wght@400;700&family=Orbit&family=Jeju+Gothic&family=Jeju+Myeongjo&family=Jeju+Hallasan&family=Dongle:wght@300;400;700&family=Grandiflora+One&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <!-- MOBILE HEADER -->
    <div class="mobile-header">
      <span class="mobile-logo">✦ 카드메이커</span>
      <div class="mobile-header-actions">
        <button class="mobile-export-btn" id="mobileExportPng">PNG</button>
        <button class="mobile-export-btn sec" id="mobileExportJpg">JPG</button>
      </div>
    </div>

    <!-- LEFT PANEL: TOOLS -->
    <aside class="panel left-panel">
      <div class="panel-header">
        <span class="logo">✦ 카드메이커</span>
      </div>

      <div class="panel-section">
        <div class="section-label">이미지</div>
        <label class="upload-btn" id="uploadLabel">
          <input type="file" id="imageUpload" accept="image/*" hidden />
          <span class="upload-icon">＋</span>
          <span>이미지 업로드</span>
        </label>
        <div class="image-position-grid" id="imagePositionGrid">
          <button class="pos-btn active" data-pos="left" title="좌측">◧</button>
          <button class="pos-btn" data-pos="right" title="우측">◨</button>
          <button class="pos-btn" data-pos="top" title="상단">⬒</button>
          <button class="pos-btn" data-pos="bottom" title="하단">⬓</button>
          <button class="pos-btn" data-pos="background" title="배경">⬜</button>
        </div>
        <div class="section-label" style="margin-top:10px">이미지 여백 (px)</div>
        <div class="image-padding-grid">
          <div></div>
          <label class="img-pad-label">상<input type="number" id="imgPadTop" value="0" min="0" max="200" /></label>
          <div></div>
          <label class="img-pad-label">좌<input type="number" id="imgPadLeft" value="0" min="0" max="200" /></label>
          <div></div>
          <label class="img-pad-label">우<input type="number" id="imgPadRight" value="0" min="0" max="200" /></label>
          <div></div>
          <label class="img-pad-label">하<input type="number" id="imgPadBottom" value="0" min="0" max="200" /></label>
          <div></div>
        </div>
      </div>

      

      <div class="panel-section">
        <div class="section-label">카드 크기</div>
        <div class="slider-row">
          <span class="size-label">W</span>
          <input type="range" id="cardWidthSlider" min="300" max="1000" value="720" step="10" />
          <span id="cardWidthVal" class="size-val">720</span>
        </div>
        <div class="slider-row" style="margin-top:8px">
          <span class="size-label">H</span>
          <input type="range" id="cardHeightSlider" min="200" max="800" value="470" step="10" />
          <span id="cardHeightVal" class="size-val">470</span>
        </div>
      </div>

      <div class="panel-section">
        <div class="section-label">폰트 전체 바꾸기</div>
        <select id="fontSelect" class="font-select">
        </select>
      </div>

      <div class="panel-section">
        <div class="section-label">배경색</div>
        <div class="color-swatches">
          <button class="swatch active" data-color="#ffffff" style="background:#ffffff;border:2px solid #ddd"></button>
          <button class="swatch" data-color="#fdf6f0" style="background:#fdf6f0"></button>
          <button class="swatch" data-color="#0d1b2a" style="background:#0d1b2a"></button>
          <label class="swatch custom-color-btn" title="직접 선택">
            <input type="color" id="bgColorPicker" value="#ffffff" />
            <span>🎨</span>
          </label>
        </div>
        <input type="text" id="bgHexInput" class="hex-input" maxlength="7" placeholder="#ffffff" />
      </div>

      <div class="panel-section">
        <div class="section-label">카드 사용 색상</div>
        <div class="card-colors-swatches" id="cardColorsSwatches"></div>
      </div>

      <div class="panel-section" style="display:none">
        <div class="section-label">강조 색상</div>
        <div class="color-swatches">
          <button class="swatch active" data-color="#ff6b9d" style="background:#ff6b9d"></button>
          <button class="swatch" data-color="#845ec2" style="background:#845ec2"></button>
          <button class="swatch" data-color="#0081cf" style="background:#0081cf"></button>
          <button class="swatch" data-color="#00c9a7" style="background:#00c9a7"></button>
          <button class="swatch" data-color="#f9a825" style="background:#f9a825"></button>
          <button class="swatch" data-color="#e53935" style="background:#e53935"></button>
          <button class="swatch" data-color="#333333" style="background:#333333"></button>
          <label class="swatch custom-color-btn" title="직접 선택">
            <input type="color" id="accentColorPicker" value="#ff6b9d" />
            <span>🎨</span>
          </label>
        </div>
      </div>


      <div class="panel-bottom">
        <div class="export-scale-btns">
          <button class="scale-btn" data-scale="1">1x</button>
          <button class="scale-btn" data-scale="2">2x</button>
          <button class="scale-btn active" data-scale="4">4x</button>
        </div>
        <div class="export-btns">
          <button class="export-btn" id="exportPng">PNG</button>
          <button class="export-btn export-btn-sec" id="exportJpg">JPG</button>
        </div>
        <button class="clear-btn" id="clearBtn">초기화</button>
      </div>
    </aside>

    <!-- CENTER: CANVAS -->
    <main class="canvas-area">
      <div class="canvas-wrapper">
        <div class="canvas-inner">
        <!-- RESIZE HANDLES (outside card so overflow:hidden doesn't clip them) -->
        <div class="resize-handle resize-e" data-dir="e"></div>
        <div class="resize-handle resize-s" data-dir="s"></div>
        <div class="resize-handle resize-se" data-dir="se"></div>

        <div class="card-container" id="cardContainer">

          <!-- IMAGE AREA -->
          <div class="card-image-area" id="cardImageArea">
            <div class="image-placeholder" id="imagePlaceholder">
              <span>이미지를<br/>업로드하세요</span>
            </div>
            <img id="cardImage" src="" alt="" style="display:none" />
          </div>

          <!-- TEXT AREA -->
          <div class="card-text-area" id="cardTextArea">
            <div class="blocks-container" id="blocksContainer">
              <!-- blocks rendered by JS -->
            </div>
          </div>
        </div>
        </div><!-- /canvas-inner -->
      </div>
      <div class="canvas-hint">모서리·가장자리를 드래그해 카드 크기 조절</div>
      <div class="zoom-bar">
        <span class="zoom-icon">🔍</span>
        <input type="range" id="zoomSlider" min="25" max="200" value="100" step="5" />
        <span id="zoomVal">100%</span>
      </div>
      <div class="version-badge" id="versionBadge">v2.1</div>
      <div class="version-badge" id="sizeBadge" style="right:auto;left:18px;pointer-events:none"></div>
      <div class="version-panel" id="versionPanel">
        <div class="version-panel-inner" id="versionPanelInner"></div>
      </div>
    </main>

    <!-- MOBILE TAB BAR -->
    <div class="mobile-tab-bar">
      <button class="mobile-tab-btn active" data-tab="tools">
        <span class="mobile-tab-icon">◧</span>
        <span>도구</span>
      </button>
      <button class="mobile-tab-btn" data-tab="blocks">
        <span class="mobile-tab-icon">&#9776;</span>
        <span>블록 편집</span>
      </button>
    </div>

    <!-- RIGHT PANEL: BLOCK EDITOR -->
    <aside class="panel right-panel" id="rightPanel">
      <div class="panel-header">
        <span class="logo">블록 편집</span>
      </div>
      <div class="panel-section">
        <div class="section-label">블록 추가</div>
        <div class="add-block-btns">
          <button class="add-block-btn" data-type="title">＋ 제목</button>
          <button class="add-block-btn" data-type="subtitle">＋ 부제목</button>
          <button class="add-block-btn" data-type="body">＋ 본문</button>
          <button class="add-block-btn" data-type="info">＋ 정보 행</button>
          <button class="add-block-btn" data-type="divider">＋ 구분선</button>
        </div>
      </div>
      <div id="blockEditorContent">
        <div class="no-selection">블록을 클릭하면<br/>여기서 편집할 수 있어요</div>
      </div>
    </aside>
  </div>

  <!-- CROP MODAL -->
  <div class="crop-modal" id="cropModal">
    <div class="crop-modal-box">
      <div class="crop-modal-header">
        <span class="crop-modal-title">이미지 자르기</span>
        <div class="crop-modal-actions">
          <button class="crop-btn-cancel" id="cropCancel">취소</button>
          <button class="crop-btn-confirm" id="cropConfirm">적용</button>
        </div>
      </div>
      <div class="crop-canvas-wrapper" id="cropCanvasWrapper">
        <div class="crop-canvas-frame">
          <canvas id="cropCanvas"></canvas>
          <div class="crop-overlay" id="cropOverlay">
            <div class="crop-box" id="cropBox">
              <div class="crop-handle crop-handle-nw" data-dir="nw"></div>
              <div class="crop-handle crop-handle-ne" data-dir="ne"></div>
              <div class="crop-handle crop-handle-sw" data-dir="sw"></div>
              <div class="crop-handle crop-handle-se" data-dir="se"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
